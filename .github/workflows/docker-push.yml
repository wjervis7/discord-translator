---
name: Publish Docker Image

#
# Documentation:
# https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions
#

#####################################
# Start the job on all PR to master #
#####################################
on:
  push:
    branches: [master]
    tags:
      - 'v*'

###############
# Set the Job #
###############
jobs:
  build:
    # Name the Job
    name: Publish Docker Image to ghcr.io
    # Set the agent to run on
    runs-on: ubuntu-latest

    ##################
    # Load all steps #
    ##################
    steps:
      ##########################
      # Checkout the code base #
      ##########################
      - name: Checkout Code
        uses: actions/checkout@v3

      ##################
      # Log in to GHCR #
      ##################
      - name: Log in to GHCR
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #################
      # Set up labels #
      #################
      - name: Set output
        run: echo ${{ steps.vars.outputs.branch }}

      - name: Extract metadata (tags, labels) for Docker image
        id: meta
        uses: docker/metadata-action@v3.6.2
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/discord-translate-bot
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ steps.vars.outputs.branch == 'master' }}
            type=raw,value=beta,enable=${{ steps.vars.outputs.branch == 'dev' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      #################
      # Set up Buildx #
      #################
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      ########################
      # Build and push image #
      ########################
      - name: Build and Publish Docker Image
        uses: docker/build-push-action@v2.8.0
        with: 
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64